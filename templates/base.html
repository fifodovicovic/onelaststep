<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ONE LAST STEP{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  <style>
    :root {
      --c-bg:      {{ colors.bg }};
      --c-fill:    {{ colors.fill }};
      --c-outline: {{ colors.outline }};
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
  <script src="{{ url_for('static', filename='js/scene-nav.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
